# HTTP — serves the app and handles Certbot ACME challenges.
# Once you have a TLS cert, replace this file with the HTTPS config
# (see nginx/conf.d/app-ssl.conf.example).
server {
    listen 80;
    server_name chattosales.duckdns.org;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Proxy to FastAPI ──────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     120s;   # longer for WebSocket / streaming

        # Upload size limit
        client_max_body_size 10m;
    }
}
